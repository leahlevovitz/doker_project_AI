services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  seq:
    image: datalust/seq:latest
    ports:
      - "5341:5341"
      - "8081:80"
    environment:
      ACCEPT_EULA: "Y"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1434:1433"
    volumes:
      - sql_data:/var/opt/mssql

  # ── Microservices ─────────────────────────────────────────────────────────────

  product-catalog-1:
    build:
      context: ./microservices/ProductCatalogService
      dockerfile: Dockerfile
    environment:
      - MongoDB__ConnectionString=mongodb://mongo:27017
      - MongoDB__DatabaseName=ChineseAuction
      - Redis__ConnectionString=redis:6379
      - Seq__ServerUrl=http://seq:5341
    depends_on:
      - mongo
      - redis
      - seq
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  product-catalog-2:
    build:
      context: ./microservices/ProductCatalogService
      dockerfile: Dockerfile
    environment:
      - MongoDB__ConnectionString=mongodb://mongo:27017
      - MongoDB__DatabaseName=ChineseAuction
      - Redis__ConnectionString=redis:6379
      - Seq__ServerUrl=http://seq:5341
    depends_on:
      - mongo
      - redis
      - seq
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  inventory:
    build:
      context: ./microservices/InventoryService
      dockerfile: Dockerfile
    environment:
      - Redis__ConnectionString=redis:6379
      - RabbitMQ__Host=rabbitmq
      - Seq__ServerUrl=http://seq:5341
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      seq:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  order:
    build:
      context: ./microservices/OrderService
      dockerfile: Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=OrdersDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True
      - RabbitMQ__Host=rabbitmq
      - Seq__ServerUrl=http://seq:5341
    depends_on:
      rabbitmq:
        condition: service_healthy
      sqlserver:
        condition: service_started
      seq:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  notification:
    build:
      context: ./microservices/NotificationService
      dockerfile: Dockerfile
    environment:
      - MongoDB__ConnectionString=mongodb://mongo:27017
      - MongoDB__DatabaseName=ChineseAuction
      - RabbitMQ__Host=rabbitmq
      - Seq__ServerUrl=http://seq:5341
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_started
      seq:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Load Balancer (Nginx) ─────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./microservices/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - product-catalog-1
      - product-catalog-2

  # ── BFF ───────────────────────────────────────────────────────────────────────

  bff:
    build:
      context: ./microservices/BffService
      dockerfile: Dockerfile
    environment:
      - Services__ProductCatalog=http://product-catalog-1:8080
      - Services__Order=http://order:8080
    depends_on:
      - product-catalog-1
      - order

  # ── API Gateway (YARP) ────────────────────────────────────────────────────────

  gateway:
    build:
      context: ./microservices/ApiGateway
      dockerfile: Dockerfile
    ports:
      - "5050:8080"
    depends_on:
      - product-catalog-1
      - product-catalog-2
      - order
      - inventory
      - notification
      - bff

volumes:
  mongo_data:
  sql_data:
